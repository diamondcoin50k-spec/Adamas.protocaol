<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background-color: #101010; color: #ffffff; font-family: Arial, sans-serif; }
        .container { width: 80%; margin: auto; padding: 20px; }
        .card { background-color: #1E1E1E; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #00F2FE; }
        .accent { color: #00F2FE; font-weight: bold; }
        .button { background-color: #00F2FE; color: #000; padding: 10px 20px; border-radius: 5px; text-decoration: none; cursor: pointer; }
        .roadmap-item { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Adamas Protocol <span class="accent">($ADS)</span></h1>
        
        <div class="card">
            <h2>Contract Details</h2>
            <p>Address: <span class="accent">0x9D53BbacB70DD3D92604AdAC86FC4D5A6a96d2E5</span></p>
            <p>Total Supply: <span class="accent">21,000 ADS</span></p>
            <button class="button">Connect Wallet</button>
        </div>

        <div class="card">
            <h2>Roadmap</h2>
            <div class="roadmap-item">✅ Phase 1: Contract Deployment</div>
            <div class="roadmap-item">⏳ Phase 2: Website & Bot Setup</div>
            <div class="roadmap-item">🔜 Phase 3: Marketing & Airdrop</div>
            <div class="roadmap-item">🔜 Phase 4: Mainnet Launch</div>
        </div>
    </div>
</body>
</html>
