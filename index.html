<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adamas Protocol | Ecosystem</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        .accent { color: #00F2FE; font-weight: bold; font-size: 24px; text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
        .button { background: linear-gradient(90deg, #00F2FE, #4FACFE); color: #000; padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .button:disabled { opacity: 0.5; cursor: not-allowed; }
        .locked { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        
        /* Spin Wheel */
        .wheel-container { position: relative; width: 200px; height: 200px; margin: 20px auto; border: 5px solid #00F2FE; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); background: #1a1a1a; font-size: 50px; }
        .pointer { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid red; position: absolute; top: -10px; z-index: 10; }

        #toast { visibility: hidden; min-width: 200px; background: #161616; border: 1px solid #00F2FE; color: #fff; text-align: center; border-radius: 10px; padding: 16px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        #toast.show { visibility: visible; animation: fadein 0.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    </style>
</head>
<body>
    <div id="toast">Message</div>
    <div class="container">
        <h1 style="color: #00F2FE;">💎 Adamas Protocol</h1>
        <button class="button" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>

        <div class="card">
            <p>Your Balance</p>
            <div class="accent"><span id="points">0</span> Points</div>
            <p style="font-size: 14px; color: #aaa;">Estimated Value: <span id="tokenPreview">0</span> $ADS</p>
            
            <button class="button" id="convertBtn" onclick="submitClaimRequest()" style="background: #222; color: #00F2FE; border: 1px solid #00F2FE;">
                Submit Claim Request
            </button>
            <p id="requestStatus" style="font-size: 12px; margin-top: 10px; color: #ffa500; display: none;">
                ⏳ Your request is pending review...
            </p>
        </div>

        <div class="card locked" id="spinSection">
            <h3>🎡 Daily Lucky Spin</h3>
            <div class="pointer"></div>
            <div class="wheel-container" id="wheel">🎰</div>
            <button class="button" id="spinBtn" onclick="spinNow()">SPIN FOR POINTS</button>
        </div>
    </div>

    <script>
        let userPoints = 0;
        let isWalletConnected = false;
        const CONVERSION_RATE = 1000; // 1000 Points = 1 $ADS
        
        // CONTRACT CONFIGURATION
        const contractAddress = "0x9D53BbacB70DD3D92604AdAC86FC4D5A6a96d2E5";
        const contractABI =[{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"allowance","type":"uint256"},{"internalType":"uint256","name":"needed","type":"uint256"}],"name":"ERC20InsufficientAllowance","type":"error"},{"inputs":[{"internalType":"address","name":"sender","type":"address"},{"internalType":"uint256","name":"balance","type":"uint256"},{"internalType":"uint256","name":"needed","type":"uint256"}],"name":"ERC20InsufficientBalance","type":"error"},{"inputs":[{"internalType":"address","name":"approver","type":"address"}],"name":"ERC20InvalidApprover","type":"error"},{"inputs":[{"internalType":"address","name":"receiver","type":"address"}],"name":"ERC20InvalidReceiver","type":"error"},{"inputs":[{"internalType":"address","name":"sender","type":"address"}],"name":"ERC20InvalidSender","type":"error"},{"inputs":[{"internalType":"address","name":"spender","type":"address"}],"name":"ERC20InvalidSpender","type":"error"},{"inputs":[{"internalType":"address","name":"owner","type":"address"}],"name":"OwnableInvalidOwner","type":"error"},{"inputs":[{"internalType":"address","name":"account","type":"address"}],"name":"OwnableUnauthorizedAccount","type":"error"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"owner","type":"address"},{"indexed":true,"internalType":"address","name":"spender","type":"address"},{"indexed":false,"internalType":"uint256","name":"value","type":"uint256"}],"name":"Approval","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"previousOwner","type":"address"},{"indexed":true,"internalType":"address","name":"newOwner","type":"address"}],"name":"OwnershipTransferred","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"address","name":"account","type":"address"}],"name":"Paused","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"from","type":"address"},{"indexed":true,"internalType":"address","name":"to","type":"address"},{"indexed":false,"internalType":"uint256","name":"value","type":"uint256"}],"name":"Transfer","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"address","name":"account","type":"address"}],"name":"Unpaused","type":"event"},{"inputs":[],"name":"LOCK_PERIOD","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"TOTAL_SUPPLY","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"airdropPool","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"owner","type":"address"},{"internalType":"address","name":"spender","type":"address"}],"name":"allowance","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"value","type":"uint256"}],"name":"approve","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"account","type":"address"}],"name":"balanceOf","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"decimals","outputs":[{"internalType":"uint8","name":"","type":"uint8"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"deployTime","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"liquidityPool","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"name","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"pause","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"paused","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"renounceOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"stakingPool","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"symbol","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"teamReserve","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"totalSupply","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"value","type":"uint256"}],"name":"transfer","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"from","type":"address"},{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"value","type":"uint256"}],"name":"transferFrom","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"unpause","outputs":[],"stateMutability":"nonpayable","type":"function"}]

        let provider, signer, contract;
        
        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    // Force switch to Amoy
                    await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x13882' }] });
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Init Ethers
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();
                    contract = new ethers.Contract(contractAddress, contractABI, signer);
                    
                    document.getElementById("connectBtn").innerText = accounts[0].substring(0,6) + "... Connected";
                    document.getElementById("spinSection").classList.remove("locked");
                    isWalletConnected = true;
                    showToast("✅ Wallet Connected!");
                } catch (e) { showToast("❌ Connection Denied"); }
            } else { showToast("🦊 Install MetaMask!"); }
        }

        function spinNow() {
            if (!isWalletConnected) return;

            const lastSpin = localStorage.getItem("lastSpin");
            if (lastSpin === new Date().toDateString()) {
                showToast("⏳ Aaj ka spin ho gaya! Kal aana.");
                return;
            }

            const wheel = document.getElementById("wheel");
            const spinBtn = document.getElementById("spinBtn");
            const deg = Math.floor(Math.random() * 360) + 1440; 
            wheel.style.transform = `rotate(${deg}deg)`;
            spinBtn.disabled = true;

            setTimeout(() => {
                const win = [100, 200, 300, 500][Math.floor(Math.random() * 4)];
                userPoints += win;
                updateUI();
                localStorage.setItem("lastSpin", new Date().toDateString());
                showToast(`🎁 Mubarak ho! ${win} Points mile!`);
                spinBtn.disabled = false;
            }, 4000);
        }

        function updateUI() {
            document.getElementById("points").innerText = userPoints;
            document.getElementById("tokenPreview").innerText = (userPoints / CONVERSION_RATE).toFixed(2);
        }

        function submitClaimRequest() {
            if (!isWalletConnected) {
                showToast("🛑 Pehle wallet connect karo!");
                return;
            }
            
            if (userPoints < CONVERSION_RATE) {
                showToast(`❌ Minimum ${CONVERSION_RATE} points chahiye!`);
                return;
            }

            const tokens = (userPoints / CONVERSION_RATE).toFixed(2);
            showToast(`🚀 Claim Request for ${tokens} $ADS Sent!`);
            
            document.getElementById("requestStatus").style.display = "block";
            document.getElementById("requestStatus").innerText = `✅ Request sent for ${tokens} $ADS. It will be sent to your wallet during the next airdrop round.`;
            
            // Reset points
            userPoints = 0;
            updateUI();
        }
    </script>
</body>
</html>
