<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adamas Protocol ($ADS) | Ecosystem</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 95%; max-width: 1200px; margin-top: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #333; flex-wrap: wrap; }
        .logo { font-size: 28px; font-weight: bold; color: #00F2FE; text-shadow: 0 0 15px rgba(0, 242, 254, 0.7); }
        .card { background-color: #161616; padding: 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #222; text-align: center; transition: 0.3s; }
        .button { background: linear-gradient(90deg, #00F2FE 0%, #4FACFE 100%); color: #000; padding: 12px 24px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; display: inline-block; text-decoration: none;}
        .button:hover { box-shadow: 0 0 15px rgba(0, 242, 254, 0.5); transform: scale(1.05); }
        .button-secondary { background: #222; color: #fff; border: 1px solid #444; }
        .button-secondary:hover { background: #333; }
        .accent { color: #00F2FE; font-weight: bold; font-size: 22px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .locked { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        
        /* Spin Wheel */
        .wheel-box { position: relative; width: 150px; height: 150px; margin: 10px auto; border: 4px solid #00F2FE; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: #000; font-size: 40px; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid #ff0000; z-index: 10; }

        #toast { visibility: hidden; min-width: 250px; background-color: #161616; color: #fff; text-align: center; border-radius: 10px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); border: 1px solid #00F2FE; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <div id="toast">Message</div>
    <div class="container">
        <header>
            <div class="logo">💎 Adamas Protocol</div>
            <button class="button" id="connectBtn">🦊 Connect Wallet</button>
        </header>

        <div class="card" id="socialCard">
            <h3>🔒 Unlock Ecosystem</h3>
            <p>Follow us to unlock all features!</p>
            <div style="display:flex; gap:10px; justify-content:center; margin-bottom: 15px;">
                <a href="https://t.me/daimodmo" target="_blank" class="button button-secondary">📱 Telegram</a>
                <a href="https://twitter.com/DiamoProtocol" target="_blank" class="button button-secondary">🐦 Twitter</a>
            </div>
            <button class="button" onclick="verifySocials()">✅ Verify Follows</button>
        </div>

        <div class="card locked" id="claimCard">
            <h3>Your Ecosystem Points</h3>
            <div class="accent"><span id="userPoints">0</span> Points</div>
            <p>≈ <span id="tokenPreview">0</span> $ADS</p>
            <button class="button button-secondary" onclick="submitClaimRequest()">Submit Claim Request</button>
        </div>

        <div class="grid locked" id="featuresGrid">
            <div class="card" id="spinCard">
                <h3>🎡 Daily Lucky Spin</h3>
                <div class="pointer"></div>
                <div class="wheel-box" id="wheel">🎰</div>
                <button class="button" id="spinBtn" onclick="spinNow()">SPIN</button>
            </div>

            <div class="card" id="tapCard">
                <h3>🕹️ Tap to Earn</h3>
                <div style="font-size: 50px; cursor: pointer; margin: 20px;" onclick="tapAction()">👆</div>
            </div>

            <div class="card" id="memeCard">
                <h3>🎨 Meme to Earn</h3>
                <input type="file" id="memeFile" accept="image/*" style="margin:10px 0; color:white;">
                <button class="button" onclick="uploadMeme()">Upload Meme</button>
            </div>
            
            <div class="card" id="stakeCard">
                <h3>⛏️ Staking/Mining</h3>
                <p>Stake your $ADS tokens</p>
                <button class="button" onclick="stakeTokens()">Stake</button>
            </div>
        </div>
    </div>

    <script>
        let userPoints = 0;
        let isWalletConnected = false;
        let isSocialVerified = false;
        const CONVERSION_RATE = 1000;
        
        // --- CONFIG ---
        const contractAddress = "0x9D53BbacB70DD3D92604AdAC86FC4D5A6a96d2E5";

        let provider, signer, contract;
        const connectBtn = document.getElementById('connectBtn');

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        // --- WALLET CONNECT (Robust) ---
        connectBtn.addEventListener('click', async () => {
            if (window.ethereum) {
                try {
                    // 1. Switch Network
                    await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x13882' }] });
                    // 2. Request Account
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Init Ethers
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();
                    contract = new ethers.Contract(contractAddress, contractABI, signer);
                    
                    connectBtn.innerText = accounts[0].substring(0,6) + "...Connected";
                    isWalletConnected = true;
                    showToast("✅ Connected to Amoy Testnet!");
                } catch (e) { showToast("❌ Connection Failed"); console.error(e); }
            } else { showToast("🦊 Install MetaMask!"); }
        });

        // --- FEATURES ---
        function updateUI() {
            document.getElementById("userPoints").innerText = userPoints;
            document.getElementById("tokenPreview").innerText = (userPoints / CONVERSION_RATE).toFixed(2);
        }

        function verifySocials() {
            if(!isWalletConnected) { showToast("🛑 Connect Wallet First!"); return; }
            showToast("🔄 Verifying...");
            setTimeout(() => {
                isSocialVerified = true;
                document.getElementById('claimCard').classList.remove('locked');
                document.getElementById('featuresGrid').classList.remove('locked');
                showToast("✅ Socials Verified! All features unlocked!");
            }, 1500);
        }

        function spinNow() {
            if (!isWalletConnected || !isSocialVerified) return;
            const lastSpin = localStorage.getItem("lastSpin");
            if (lastSpin === new Date().toDateString()) { showToast("⏳ Come back tomorrow!"); return; }

            const wheel = document.getElementById("wheel");
            const deg = Math.floor(Math.random() * 360) + 1440; 
            wheel.style.transform = `rotate(${deg}deg)`;
            
            setTimeout(() => {
                const win = [50, 100, 200, 500][Math.floor(Math.random() * 4)];
                userPoints += win;
                updateUI();
                localStorage.setItem("lastSpin", new Date().toDateString());
                showToast(`🎁 You won ${win} points!`);
            }, 4000);
        }

        function tapAction() {
            if (!isWalletConnected || !isSocialVerified) return;
            userPoints += 1;
            updateUI();
        }

        function uploadMeme() {
            if (!isWalletConnected || !isSocialVerified) return;
            showToast("📤 Meme submitted for review!");
        }

        function stakeTokens() {
            if (!isWalletConnected || !isSocialVerified) return;
            showToast("🔒 Staking initiated!");
        }

        function submitClaimRequest() {
            if (!isWalletConnected || !isSocialVerified || userPoints < CONVERSION_RATE) { showToast("❌ Not enough points!"); return; }
            showToast("🚀 Claim Request Sent!");
            userPoints = 0;
            updateUI();
        }
    </script>
</body>
</html>
