<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adamas Protocol</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        
        /* Header Style */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .logo { font-size: 20px; font-weight: bold; color: white; display: flex; align-items: center; gap: 5px; }
        
        /* Card Style */
        .card { background: #161616; border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px solid #333; box-shadow: 0 0 10px rgba(0,255,255,0.2); }
        
        /* Button Styles */
        button { border: none; border-radius: 20px; padding: 10px 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .connect-btn { background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); color: black; }
        .social-btn { background: #222; color: white; width: 45%; margin: 5px; }
        .verify-btn { background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); color: white; width: 90%; margin-top: 15px; }
        .action-btn { background: #00d2ff; color: black; width: 45%; margin: 10px; }
        
        button:hover { opacity: 0.8; transform: scale(1.05); }
        button:disabled { background: #555; cursor: not-allowed; }

        .hidden { display: none; }
        .stats-box { text-align: left; font-size: 14px; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">💎 Adamas Protocol</div>
        <button id="connectButton" class="connect-btn">Connect Wallet</button>
    </div>

    <div class="card">
        <h3>🔒 Follow to Unlock Protocol</h3>
        <p>Pehle Wallet Connect karein, fir socials follow karke verify karein.</p>
        
        <a href="https://t.me/daimodmo" target="_blank"><button class="social-btn">✈️ Telegram</button></a>
        <a href="https://twitter.com/DiamoProtocol" target="_blank"><button class="social-btn">🐦 Twitter</button></a>
        
        <button id="verifyButton" class="verify-btn">✅ Verify Follows</button>
        
        <p id="lockStatus" style="color: #ff4444; font-weight: bold;">❌ Features Locked</p>
    </div>

    <div id="earnCard" class="card hidden">
        <h3>💰 Earn $ADS</h3>
        <button id="tapButton" class="action-btn" style="background: #ffcc00; color: black;">👆 TAP TAP</button>
        <button id="mineButton" class="action-btn" style="background: #ff00ff; color: white;">⛏️ Mine (24h)</button>
        <p id="miningStatus"></p>
        <p>Balance: <span id="balance">0</span> $ADS</p>
    </div>

    <div class="card stats-box">
        <h4>📊 Project Stats</h4>
        <p><strong>Contract:</strong> 0x9D53BbacB70DD3D92604AdAC86FC4D5A6a96d2E5</p>
        <p><strong>Network:</strong> Polygon Mainnet</p>
    </div>
</div>

<script>
    let balance = 0;
    const connectButton = document.getElementById('connectButton');
    const verifyButton = document.getElementById('verifyButton');
    const earnCard = document.getElementById('earnCard');
    const lockStatus = document.getElementById('lockStatus');
    const tapButton = document.getElementById('tapButton');
    const mineButton = document.getElementById('mineButton');
    const miningStatus = document.getElementById('miningStatus');

    // 1. Wallet Connection
    connectButton.addEventListener('click', async () => {
        if (window.ethereum) {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                connectButton.innerText = accounts[0].substring(0, 6) + "...";
                connectButton.disabled = true;
                alert("🎉 Congratulations! Wallet Connected! 🥳");
            } catch (e) { alert("❌ Connection failed"); }
        } else { alert("⚠️ Please install MetaMask!"); }
    });

    // 2. Verify Tasks
    verifyButton.addEventListener('click', () => {
        if (connectButton.disabled) {
            alert("🎉 Tasks Verified! Welcome to Adamas Protocol! 🚀💸");
            earnCard.classList.remove('hidden');
            lockStatus.innerText = "✅ Features Unlocked";
            lockStatus.style.color = "#00ff00";
            verifyButton.disabled = true;
        } else {
            alert("⚠️ Please connect your wallet first!");
        }
    });

    // 3. Tap to Earn
    tapButton.addEventListener('click', () => {
        balance += 1;
        document.getElementById('balance').innerText = balance;
        // Chhota animation ya sound yahan add kar sakte hain
    });

    // 4. Mining (24h)
    mineButton.addEventListener('click', () => {
        mineButton.disabled = true;
        mineButton.innerText = "Mining...";
        miningStatus.innerText = "⏳ Mining 100 $ADS... Come back in 24 hours! 🚀";
        alert("🎉 Mining Started! ⛏️ Come back tomorrow for your rewards! 🥳");
        
        // Simulating 24h (testing ke liye 5 sec)
        setTimeout(() => {
            balance += 100;
            document.getElementById('balance').innerText = balance;
            mineButton.disabled = false;
            mineButton.innerText = "⛏️ Mine (24h)";
            miningStatus.innerText = "✅ Mining finished!";
            alert("🤑 Congratulations! You mined 100 $ADS! 🥳");
        }, 5000); 
    });
</script>

</body>
</html>
