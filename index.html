    // ---------------------------------

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg; t.className = "show";
        setTimeout(() => t.className = "", 3000);
    }

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    connectBtn.addEventListener('click', async () => {
        if (typeof window.ethereum === 'undefined') {
            showToast("🦊 Please install MetaMask!");
            return;
        }

        try {
            showToast("🦊 Requesting MetaMask...");

            // Step 1: Request accounts
            const accounts = await window.ethereum.request({
                method: "eth_requestAccounts",
            });

            if (!accounts || accounts.length === 0) {
                showToast("❌ No accounts found");
                return;
            }

            // Step 2: Switch or add Amoy Testnet
            try {
                await window.ethereum.request({
                    method: "wallet_switchEthereumChain",
                    params: [{ chainId: "0x13882" }],
                });
            } catch (switchError) {
                if (switchError.code === 4902) {
                    showToast("⏳ Adding Polygon Amoy...");
                    await window.ethereum.request({
                        method: "wallet_addEthereumChain",
                        params: [
                            {
                                chainId: "0x13882",
                                chainName: "Polygon Amoy Testnet",
                                nativeCurrency: {
                                    name: "POL",
                                    symbol: "POL",
                                    decimals: 18,
                                },
                                rpcUrls: ["https://rpc-amoy.polygon.technology"],
                                blockExplorerUrls: ["https://amoy.polygonscan.com"],
                            },
                        ],
                    });
                    await sleep(1000);
                } else {
                    throw switchError;
                }
            }

            // Step 3: Create provider & signer
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const address = await signer.getAddress();

            connectBtn.innerText = address.substring(0,6) + "...Connected";
            isWalletConnected = true;
            showToast("✅ Connected to Amoy Testnet!");
        } catch (e) {
            if (e.code === 4001) {
                showToast("🛑 User rejected request");
            } else {
                console.error("Connection error:", e);
                showToast("❌ Failed to connect: " + (e.message || e.toString()));
            }
        }
    });

    function verifySocials() {
        if (!isWalletConnected) {
            showToast("🛑 Connect Wallet First!");
            return;
        }
        isSocialVerified = true;
        document.getElementById('claimCard').classList.remove('locked');
        document.getElementById('featuresGrid').classList.remove('locked');
        showToast("✅ Features Unlocked!");
    }
    
    function tapAction() {
        if (isWalletConnected && isSocialVerified) {
            showToast("👆 Points +1");
        }
    }
    function spinNow() {
        if (isWalletConnected && isSocialVerified) {
            showToast("🎡 Spinning...");
        }
    }
    function uploadMeme() {
        if (isWalletConnected && isSocialVerified) {
            showToast("📤 Uploading...");
        }
    }
    function stakeTokens() {
        if (isWalletConnected && isSocialVerified) {
            showToast("🔒 Staking...");
        }
    }
    function submitClaimRequest() {
        if (isWalletConnected && isSocialVerified) {
            showToast("🚀 Request Sent!");
        }
    }
